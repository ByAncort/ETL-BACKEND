spring:
  application:
    name: swiggy-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RateLimitFilter
            - AuthenticationFilter

        - id: identity-service-secured
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RateLimitFilter
            - AuthenticationFilter


        - id: schema-matching-ms-integrations
          uri: lb://SCHEMA-MATCHING-MS
          predicates:
            - Path=/api/integrations/connections/*
            - Method=GET
          filters:
            - AuthenticationFilter

        - id: schema-matching-ms
          uri: lb://SCHEMA-MATCHING-MS
          predicates:
            - Path=/api/schema-matches/**
          filters:
            - AuthenticationFilter

        - id: user-registry-ms
          uri: lb://USER-REGISTRY-MS
          predicates:
            - Path=/api/users/**
          filters:
            - RateLimitFilter
            - AuthenticationFilter

        - id: user-registry-ms-public
          uri: lb://USER-REGISTRY-MS
          predicates:
            - Path=/api/users/register
            - Path=/api/users/login
          filters:
            - RateLimitFilter

        - id: integration-ms
          uri: lb://INTEGRATION-MS
          predicates:
            - Path=/api/integrations/**
          filters:
            - AuthenticationFilter

        - id: api-register-ms
          uri: lb://API-REGISTER-MS
          predicates:
            - Path=/api-registry/**
          filters:
            - AuthenticationFilter

        - id: etl-config-llm-ms
          uri: lb://ETL-CONFIG-LLM-MS
          predicates:
            - Path=/api/llm-configs/**
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expiration: 1800000

server:
  port: 8080

  forward-headers-strategy: framework

logging:
  level:
    com.necronet.swiggygateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG