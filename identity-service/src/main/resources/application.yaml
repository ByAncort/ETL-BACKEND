spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:postgresql://localhost:5432/identity_db
    username: postgres
    password: 1290
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
jwt:
  secret: QWERTYUIOPASDFGHJKLZXCVBNM1234567890abcdefABCDEFGH
  expiration: 1800000
  refresh-expiration: 604800000
eureka:
  client:
    service-url:
      defaultZone : http://localhost:8761/eureka/

server:
  port: 9898