spring:
  application:
    name: api-register-ms
  datasource:
    url: jdbc:postgresql://localhost:5432/registry_api
    username: postgres
    password: 1290
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


logging:
  level:
    com.yourpackage.etl: DEBUG
server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true